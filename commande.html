<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Sushi Global Egugul</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>

<header class="no-print">
    <div class="logo">🍣 Sushi Global Egugul</div>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="commande.html">Menu</a>
    </nav>
    <button onclick="window.print()" class="btn-pdf">📄 Télécharger le Menu PDF</button>
</header>

<div class="menu-container">

    <div class="floating-cart-wrapper no-print">
        <div class="cart-badge-btn" onclick="toggleCartModal()">
            <span class="cart-counter-blue" id="cart-count">0</span>
            <span class="cart-icon">🛒</span>
        </div>

        <div class="cart-modal-box" id="cart-modal">
            <h3>🛒 السلة ديالك</h3>
            <div id="cart-items" class="cart-items-container">
                <p class="empty-cart-msg">السلة خاوية حالياً... زيد شي شهيوة 👇</p>
            </div>
            <button class="btn-send-whatsapp" onclick="sendTotalOrder()">
                🟢 تأكيد الطلب عبر الواتساب
            </button>
        </div>
    </div>
    <h2 class="section-title">Notre Assortiment Premium</h2>
    <div class="grid-layout">
        <script src="res.js"></script>
        <script>
            for (let i = 1; i <= 104; i++) {
                document.write(`
                    <div class="item-card">
                        <img src="img${i}.jpeg" alt="Sushi ${i}">
                        <p>Assortiment Premium ${i}</p>
                        <button class="btn-whatsapp no-print" onclick="addToCart('Assortiment Premium ${i}', 'img${i}.jpeg')">
                            ➕ Ajouter au panier
                        </button>
                    </div>
                `);
            }
        </script>
    </div>

    <div class="page-break"></div>

    <h2 class="section-title">Offres Box Spéciales</h2>
    <div class="grid-layout">
        <div class="item-card">
            <img src="img17.jpeg" alt="Box Me">
            <p>Box Me</p>
            <button class="btn-whatsapp no-print" onclick="addToCart('Box Me', 'img17.jpeg')">➕ Ajouter au panier</button>
        </div>
        <div class="item-card">
            <img src="img9.jpeg" alt="Box Saffron">
            <p>Box Saffron</p>
            <button class="btn-whatsapp no-print" onclick="addToCart('Box Saffron', 'img9.jpeg')">➕ Ajouter au panier</button>
        </div>
        <div class="item-card">
            <img src="img10.jpeg" alt="Box Beauty">
            <p>Box Beauty</p>
            <button class="btn-whatsapp no-print" onclick="addToCart('Box Beauty', 'img10.jpeg')">➕ Ajouter au panier</button>
        </div>
        <div class="item-card">
            <img src="img18.jpeg" alt="Box Paradise">
            <p>Box Paradise</p>
            <button class="btn-whatsapp no-print" onclick="addToCart('Box Paradise', 'img18.jpeg')">➕ Ajouter au panier</button>
        </div>
        <div class="item-card">
            <img src="img19.jpeg" alt="Box Summer">
            <p>Box Summer</p>
            <button class="btn-whatsapp no-print" onclick="addToCart('Box Summer', 'img19.jpeg')">➕ Ajouter au panier</button>
        </div>
        <div class="item-card">
            <img src="img20.jpeg" alt="Box Sea">
            <p>Box Sea</p>
            <button class="btn-whatsapp no-print" onclick="addToCart('Box Sea', 'img20.jpeg')">➕ Ajouter au panier</button>
        </div>
    </div>
</div>

<footer class="no-print">
    <p>© 2026 Sushi Global Egugul | Qualité & Fraîcheur</p>
</footer>

<script>
    const myPhoneNumber = "+212777715334"; // حط نمرتك هنا بلا +
    let cart = JSON.parse(localStorage.getItem('sushi_cart')) || [];

    updateCartUI();

    // فتح وإغلاق قائمة السلة
    function toggleCartModal() {
        const modal = document.getElementById('cart-modal');
        modal.classList.toggle('active');
    }

    function addToCart(name, img) {
        const existingItem = cart.find(item => item.name === name);
        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cart.push({ name: name, img: img, quantity: 1 });
        }
        saveAndRefresh();
        
        // تفتي السلة تلقائياً ملي يزيد شي حاجة باش ينتبه ليها
        document.getElementById('cart-modal').classList.add('active');
    }

    function changeQuantity(name, change) {
        const item = cart.find(item => item.name === name);
        if (item) {
            item.quantity += change;
            if (item.quantity <= 0) {
                cart = cart.filter(i => i.name !== name);
            }
        }
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('sushi_cart', JSON.stringify(cart));
        updateCartUI();
    }

    function updateCartUI() {
        const cartItemsDiv = document.getElementById('cart-items');
        const cartCountSpan = document.getElementById('cart-count');
        
        let totalItems = cart.reduce((total, item) => total + item.quantity, 0);
        cartCountSpan.innerText = totalItems;

        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<p class="empty-cart-msg">السلة خاوية حالياً... زيد شي شهيوة 👇</p>';
            return;
        }

        let html = '';
        cart.forEach(item => {
            html += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <img src="${item.img}" alt="${item.name}">
                        <span><b>${item.name}</b> (x${item.quantity})</span>
                    </div>
                    <div class="cart-item-actions">
                        <button onclick="changeQuantity('${item.name}', 1)">➕</button>
                        <button onclick="changeQuantity('${item.name}', -1)">➖</button>
                    </div>
                </div>
            `;
        });
        cartItemsDiv.innerHTML = html;
    }

    function sendTotalOrder() {
        if (cart.length === 0) {
            alert("السلة خاوية!");
            return;
        }

        let message = "🍣 *طلب جديد من Sushi Global Egugul* 🍣\n\n";
        message += "السلام عليكم، بغيت نكوموندي هاد الأطباق:\n";
        message += "--------------------------------------\n";
        
        cart.forEach((item, index) => {
            message += `${index + 1}) *${item.name}*\n   🔹 الكمية: ${item.quantity}\n   📷 الصورة: ${item.img}\n\n`;
        });

        message += "--------------------------------------\n";
        message += "المرجو تأكيد الطلب 🛵.";

        const whatsappUrl = `https://wa.me/${myPhoneNumber}?text=${encodeURIComponent(message)}`;
        cart = [];
        saveAndRefresh();
        window.open(whatsappUrl, '_blank');
    }
</script>

</body>
</html>
